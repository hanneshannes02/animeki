<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animeki</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="page">
      <section class="hero">
        <p class="kicker">Live-Ranking 2026</p>
        <h1>Top 10 laufende Erststaffel-Anime</h1>
        <p class="sub" id="heroDescription">
          Aggregiert aus MAL (Jikan), AniList und Kitsu. Sequels werden entfernt.
        </p>
        <div class="stats">
          <article>
            <span>Jahr</span>
            <strong id="heroYear">2026</strong>
          </article>
          <article>
            <span>Treffer</span>
            <strong id="heroCount">0</strong>
          </article>
          <article>
            <span>Quelle</span>
            <strong>3 Datenquellen</strong>
          </article>
        </div>
      </section>

      <section id="status" class="status" aria-live="polite"></section>
      <h2 class="list-title">Rangliste (je Titel eine Reihe)</h2>
      <section id="animeGrid" class="anime-grid"></section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
